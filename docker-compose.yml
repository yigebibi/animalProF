version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: petforum-db
    environment:
      POSTGRES_USER: ${DB_USER:-petforum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-petforum123}
      POSTGRES_DB: ${DB_NAME:-petforum}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - petforum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-petforum} -d ${DB_NAME:-petforum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petforum-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - petforum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ — 预留消息队列，暂未在后端代码中使用
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: petforum-mq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - petforum-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petforum-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${DB_USER:-petforum}:${DB_PASSWORD:-petforum123}@postgres:5432/${DB_NAME:-petforum}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
  # Redis — 预留缓存服务，暂未在后端代码中使用
  redis:
        condition: service_healthy
    networks:
      - petforum-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: petforum-web
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - petforum-network
    restart: unless-stopped

networks:
  petforum-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
